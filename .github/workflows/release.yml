name: Build and Release

# Tetikleyici: "v" ile başlayan tag push'ları (örn. v0.1.1, v0.2.0)
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # Release oluşturmak için gerekli

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Verify plugin version matches tag
        run: |
          PLUGIN_VERSION=$(grep -oP "PLUGIN_VERSION\s*=\s*'\K[^']+" ca_wall_panel.rb)
          if [ "$PLUGIN_VERSION" != "${{ steps.version.outputs.VERSION }}" ]; then
            echo "::error::Tag (${{ steps.version.outputs.VERSION }}) ile ca_wall_panel.rb içindeki PLUGIN_VERSION ($PLUGIN_VERSION) uyuşmuyor."
            exit 1
          fi

      - name: Build .rbz package
        run: |
          zip -r ca_wall_panel.rbz \
            ca_wall_panel.rb \
            ca_wall_panel/ \
            -x "*.DS_Store" "*.git*"
          ls -la ca_wall_panel.rbz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: CA-Wall Panel v${{ steps.version.outputs.VERSION }}
          body: |
            **Yükleme:** SketchUp → Window → Extension Manager → Install Extension → `ca_wall_panel.rbz`

            Otomatik güncelleme açıksa zaten yeni sürüm bir sonraki açılışta inecek.

            ### Değişiklikler
            <!-- Buraya release notlarını yaz; bu metin updater tarafından gösterilir -->
          files: ca_wall_panel.rbz
          draft: false
          prerelease: false
